<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TUNG TUNG WAVE TRIALS</title>
<style>
  body { margin:0; background:#000; overflow:hidden; font-family:Arial; color:#0f0; }
  canvas { display:block; }
  .screen { position:absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; background:rgba(0,0,0,0.92); z-index:30; text-align:center; }
  .screen h1 { font-size:72px; margin:0; text-shadow:0 0 30px #ff0; }
  button { font-size:32px; padding:18px 50px; margin:20px; background:#111; color:#ff0; border:5px solid #ff0; cursor:pointer; }
  button:hover { background:#ff0; color:#000; }
  #sahurImg { position:absolute; right:30px; top:120px; width:190px; z-index:15; border:6px solid #ff0; box-shadow:0 0 30px #ff0; display:none; }
  #ui { position:absolute; top:15px; left:15px; font-size:26px; pointer-events:none; z-index:10; text-shadow:0 0 10px #ff0; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<img id="sahurImg" src="https://media.sketchfab.com/models/c1f78892ae1a42478d34143d6a0f70bc/thumbnails/2f64937e0efd4d5bbdf50aa5c9183a51/e716832ee8af4e3081b879d5d50293d6.jpeg" alt="TUNG TUNG TUNG SAHUR">

<div id="mainMenu" class="screen" style="display:flex;">
  <h1>TUNG TUNG WAVE TRIALS beta-3.1</h1>
  <p style="font-size:32px;margin:10px;color:#ff0;">By Henry C & John J</p>
  <button onclick="showLevelSelect()">START TRIALS</button>
  <button onclick="alert('HOLD SPACE/CLICK = fly up\nRelease = drop\nDodge spikes + spinning saws\nLevel 1 is now chill, 5 is saw apocalypse')">HOW TO PLAY</button>
</div>

<div id="levelSelect" class="screen">
  <h1>CHOOSE TRIAL</h1>
  <button onclick="startLevel(1)">1 - Warm Up (very few saws)</button>
  <button onclick="startLevel(2)">2 - Spike Rain</button>
  <button onclick="startLevel(3)">3 - Narrow Hell</button>
  <button onclick="startLevel(4)">4 - Double Trouble</button>
  <button onclick="startLevel(5)">5 - SAHUR SAW BOSS</button>
  <button onclick="showMainMenu()">BACK</button>
</div>

<div id="levelComplete" class="screen" style="color:#ff0;">
  <h1>TRIAL COMPLETE! 🎉</h1>
  <p style="font-size:36px;">Score: <span id="finalScore">0</span></p>
  <button onclick="nextLevel()">NEXT TRIAL</button>
  <button onclick="showLevelSelect()">TRIAL SELECT</button>
</div>

<div id="restart" class="screen" style="color:#f00; background:rgba(20,0,0,0.95);">
  <h1>YOU GOT TUNGGED + SAWN 💀</h1>
  <p style="font-size:32px;">Score: <span id="deathScore">0</span></p>
  <button onclick="restartLevel()">TRY AGAIN</button>
  <button onclick="showLevelSelect()">TRIAL SELECT</button>
</div>

<div id="ui">Trial <span id="levelNum">1</span> | Score: <span id="score">0</span></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const sahurImg = document.getElementById('sahurImg');
let currentLevel = 0; // 0 = not started
let cameraX = 0;
let score = 0;
let gameOver = false;
let levelWon = false;
let holdingJump = false;
let speed = 4.2;
const difficulty = 1;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x:120, y:canvas.height - 0, size:38, vy:0 }; // safe start low

let spikes = [];
let saws = [];

function loadLevel(lvl) {
  currentLevel = lvl;
  speed = 3.8 + lvl * 0.5;
  cameraX = 0; score = 0;
  player.y = canvas.height - 500; player.vy = 0; // reset safe
  gameOver = false; levelWon = false;
  document.getElementById('levelNum').textContent = lvl;
  document.getElementById('restart').style.display = 'none';
  document.getElementById('levelComplete').style.display = 'none';

  spikes = [];
  saws = [];
  let x = 500; // longer safe zone at start
  const baseGap = 180 - lvl * 28; // level 1: ~152px, level 5: ~40px

  while (x < 6500) {
    // top + bottom spikes
    if (Math.random() < 0.85) spikes.push({x, y: canvas.height - 80, side: 'bottom'});
    if (Math.random() < 0.7) spikes.push({x: x + 60, y: 40, side: 'top'});

    // floating saws - VERY few on lvl 1, ramps up
    const sawCount = Math.floor(0.5 + lvl * 1.2 * difficulty); // lvl1 ≈0-1, lvl5 ≈6-7 per cluster
    for (let i = 0; i < sawCount; i++) {
      let sy = 140 + Math.random() * (canvas.height - 300);
      saws.push({x: x + 40 + Math.random()*120, y: sy});
    }

    x += Math.max(50, baseGap + Math.random()*40 - 20);
  }
}

function showMainMenu() {
  document.getElementById('mainMenu').style.display = 'flex';
  document.getElementById('levelSelect').style.display = 'none';
  sahurImg.style.display = 'none';
  currentLevel = 0; // reset
}
function showLevelSelect() {
  document.getElementById('mainMenu').style.display = 'none';
  document.getElementById('levelSelect').style.display = 'flex';
  sahurImg.style.display = 'none';
}
function startLevel(lvl) {
  loadLevel(lvl);
  document.getElementById('levelSelect').style.display = 'none';
  sahurImg.style.display = 'block';
}
function nextLevel() {
  let next = currentLevel + 1;
  if (next > 5) next = 1;
  startLevel(next);
}
function restartLevel() { startLevel(currentLevel); }

function jump() { if (currentLevel > 0 && !gameOver && !levelWon) holdingJump = true; }

canvas.addEventListener('mousedown', jump);
canvas.addEventListener('mouseup', () => holdingJump = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); });
canvas.addEventListener('touchend', () => holdingJump = false);
window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
window.addEventListener('keyup', e => { if (e.code === 'Space') holdingJump = false; });

function update() {
  if (currentLevel === 0 || gameOver || levelWon) return;

  player.vy = holdingJump ? -10.5 : 7.1;
  player.y += player.vy;

  if (player.y < 40 || player.y > canvas.height - 90) gameOver = true;

  cameraX += speed;
  score = Math.floor(cameraX / 10);

  for (let s of spikes) {
    let sx = s.x - cameraX;
    if (sx < -100 || sx > canvas.width + 100) continue;
    if (s.side === 'bottom' && player.y + player.size > s.y && player.x + 30 > sx && player.x < sx + 50) gameOver = true;
    if (s.side === 'top' && player.y < s.y + 70 && player.x + 30 > sx && player.x < sx + 50) gameOver = true;
  }

  for (let s of saws) {
    let sx = s.x - cameraX;
    let dx = (player.x + 19) - sx;
    let dy = (player.y + 19) - s.y;
    if (Math.sqrt(dx*dx + dy*dy) < 34) gameOver = true;
  }

  if (gameOver) {
    document.getElementById('deathScore').textContent = score;
    document.getElementById('restart').style.display = 'flex';
    sahurImg.style.display = 'none';
  }

  if (cameraX > 5800) {
    levelWon = true;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('levelComplete').style.display = 'flex';
    sahurImg.style.display = 'none';
  }
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,'#0a001f'); grad.addColorStop(1,'#000011');
  ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#222';
  ctx.fillRect(0, canvas.height-30, canvas.width, 30);
  ctx.fillRect(0, 0, canvas.width, 30);

  ctx.fillStyle = '#f33';
  for (let s of spikes) {
    let sx = s.x - cameraX;
    if (sx > -50 && sx < canvas.width + 50) {
      if (s.side === 'bottom') {
        ctx.beginPath(); ctx.moveTo(sx+25, s.y); ctx.lineTo(sx, s.y+70); ctx.lineTo(sx+50, s.y+70); ctx.fill();
      } else {
        ctx.beginPath(); ctx.moveTo(sx+25, s.y+70); ctx.lineTo(sx, s.y); ctx.lineTo(sx+50, s.y); ctx.fill();
      }
    }
  }

  ctx.fillStyle = '#ccc';
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 4;
  for (let s of saws) {
    let sx = s.x - cameraX;
    if (sx > -60 && sx < canvas.width + 60) {
      ctx.save();
      ctx.translate(sx, s.y);
      ctx.rotate(Date.now() / 80 % (Math.PI*2));
      ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.fill();
      for (let i = 0; i < 12; i++) {
        ctx.rotate(Math.PI/6);
        ctx.beginPath(); ctx.moveTo(22, -8); ctx.lineTo(38, 0); ctx.lineTo(22, 8); ctx.fill();
      }
      ctx.restore();
    }
  }

  ctx.save();
  ctx.translate(player.x + 25, player.y + 20);
  ctx.rotate(player.vy * 0.03);
  ctx.fillStyle = '#a0f';
  ctx.beginPath(); ctx.moveTo(32,0); ctx.lineTo(-22,-19); ctx.lineTo(-14,0); ctx.lineTo(-22,19); ctx.closePath(); ctx.fill();
  ctx.restore();

  document.getElementById('score').textContent = score;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

showMainMenu();
</script>
</body>
</html>
